services:
  mysql:
    image: mysql:8.0
    restart: always
    ports:
      - "3307:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: phone_store
      MYSQL_USER: phone_user
      MYSQL_PASSWORD: phone_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend-network

  # Dịch vụ Web App (Flask + Gunicorn) - ĐƯỢC CÂN BẰNG TẢI LÀM 3 BẢN SAO
  web:
    build: . 
    restart: always
    deploy:
      mode: replicated
      replicas: 3
    environment:
      - FLASK_ENV=development
      - FLASK_SECRET_KEY=doan_secret_key_fixed_2024_secure
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=phone_user
      - MYSQL_PASSWORD=phone_password
      - MYSQL_DATABASE=phone_store
      - DATABASE_URL=mysql://phone_user:phone_password@mysql:3306/phone_store
      - ADMIN_DEFAULT_PASSWORD=adadad
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/metrics', timeout=5)\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      # CHỈ cho phép Flask nằm ở mảng mạng ẩn (backend)
      - backend-network

  # Dịch vụ Reverse Proxy (Nginx) - LOAD BALANCER & GATEWAY
  nginx:
    image: nginx:latest
    restart: always
    ports:
      # Hứng yêu cầu HTTP thuần từ mạng Internet
      - "8080:80" 
      # Hứng yêu cầu HTTPS (SSL/TLS - Mã hóa đường truyền)
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./static:/app/static
      # Mount thư mục chứa chứng chỉ truy cập an toàn
      - ./ssl:/etc/nginx/ssl
    depends_on:
      web:
        condition: service_healthy
    networks:
      # Nginx có 2 "card mạng", 1 đối mặt Internet, 1 giao tiếp với backend
      - frontend-network
      - backend-network

  # [Monitoring] Bộ dò quét biến đổi mạng lưới Web
  nginx_exporter:
    image: nginx/nginx-prometheus-exporter:latest
    command:
      - --nginx.scrape-uri
      - http://nginx:80/stub_status
    restart: always
    depends_on:
      - nginx
    networks:
      - frontend-network

  # [Monitoring] System metrics exporter (CPU, Memory, Disk)
  node_exporter:
    image: prom/node-exporter:latest
    restart: always
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - frontend-network

  # [Monitoring] Thu thập và tổng hợp chỉ số băng thông
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090" # Mở cổng để gỡ lỗi tại localhost:9090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml
      - prometheus_data:/prometheus
    restart: always
    depends_on:
      web:
        condition: service_started
      node_exporter:
        condition: service_started
      nginx_exporter:
        condition: service_started
      alertmanager:
        condition: service_started
    networks:
      - frontend-network
      - backend-network

  alertmanager:
    image: prom/alertmanager:latest
    ports:
      - "9094:9093"
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    restart: always
    networks:
      - frontend-network
      - backend-network

  # [Monitoring] Bảng giám sát đồ thị trực quan (Dashboard)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000" # Truy cập: http://localhost:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ../grafana/provisioning:/etc/grafana/provisioning
      - ../grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    restart: always
    networks:
      - frontend-network

networks:
  # Mạng mặt mền không bảo mật (DMZ concept)
  frontend-network:
    driver: bridge
  # Mạng backend nội bộ bị cô lập hoàn toàn
  backend-network:
    driver: bridge

volumes:
  grafana_data:
  prometheus_data:
  alertmanager_data:
  mysql_data:
    name: nhom12_mysql_data
