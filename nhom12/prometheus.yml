global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Nginx metrics
  - job_name: 'nginx_exporter'
    static_configs:
      - targets: ['nginx_exporter:9113']

  # Flask app metrics
  - job_name: 'flask_app'
    static_configs:
      - targets: ['web:5000']
    metrics_path: '/metrics'
    scrape_interval: 5s

  # System metrics (Node Exporter)
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']
