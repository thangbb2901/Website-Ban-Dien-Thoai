# 1. BẢO VỆ CHỐNG DDOS VÀ SPAM REQUEST (Rate Limiting)
limit_req_zone $binary_remote_addr zone=req_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# 2. CỤM BACKEND (Load Balancing)
upstream backend_cluster {
    least_conn;
    server web:5000 max_fails=3 fail_timeout=30s;
}

# 3. CẤU HÌNH HTTPS (SSL/TLS) - BẢO MẬT TRUYỀN THÔNG
server {
    listen 443 ssl;
    server_name localhost;

    # Đường dẫn chứng chỉ đã mount từ volume
    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # Tối ưu bảo mật SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Location cho các file tĩnh
    location /static {
        alias /app/static;
    }

    # API endpoints
    location /api {
        proxy_pass http://backend_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Luồng xử lý chính
    location / {
        limit_req zone=req_limit burst=20 nodelay;
        limit_conn conn_limit 10;
        
        proxy_pass http://backend_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Monitoring stub_status
    location /stub_status {
        stub_status on;
        access_log off;
        allow all;
    }
}

# 4. HỖ TRỢ TRUY CẬP TRỰC TIẾP QUA HTTP (80) VÀ HTTPS (443)
server {
    listen 80;
    server_name localhost;
    
    location /static {
        alias /app/static;
    }

    location / {
        proxy_pass http://backend_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}