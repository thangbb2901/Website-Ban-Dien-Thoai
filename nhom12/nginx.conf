# 2. BẢO VỆ CHỐNG DDOS VÀ SPAM REQUEST (Rate Limiting)
# Cấp phát 10MB RAM để quản lý IP, giới hạn mỗi IP chỉ 10 request/giây
limit_req_zone $binary_remote_addr zone=req_limit:10m rate=10r/s;
# Giới hạn số lượng kết nối đồng thời từ 1 IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Khởi tạo một cụm Server Backend (Load Balancing Cluster)
upstream backend_cluster {
    # 4. THUẬT TOÁN CÂN BẰNG TẢI NÂNG CAO
    least_conn; # Thay vì quay vòng, Nginx chuyển request cho node rảnh rỗi nhất
    
    # Tính năng Health Check (Khám sức khỏe mạng)
    # Nếu container bị lỗi 3 lần, cách ly khỏi cụm mạng 30 giây
    server web:5000 max_fails=3 fail_timeout=30s;
}

server {
    # Hỗ trợ HTTP song song với HTTPS
    listen 80;
    
    # 1. GIAO THỨC TRUYỀN THÔNG BẢO MẬT (SSL/TLS)
    listen 443 ssl;
    server_name localhost;

    # Trỏ đường dẫn đến file Chứng chỉ (Certificate) và Khóa (Private Key)
    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Đầu dò lưu lượng mạng (Telemetry Endpoint) để Prometheus xuất dữ liệu
    location /stub_status {
        stub_status on;
        access_log off;
    }

    # Location cho các file tĩnh (CSS, JS, images)
    # Nginx sẽ phục vụ trực tiếp các file này rất nhanh
    location /static {
        alias /app/static; # Đường dẫn bên trong container của Flask app
    }

    # Location cho tất cả các request khác (API, trang HTML...)
    location / {
        # Kích hoạt chống DDoS cho trang web
        # Nếu vượt quá 10 req/s, đẩy 20 request vào hàng đợi (burst)
        limit_req zone=req_limit burst=20 nodelay;
        limit_conn conn_limit 10;

        # Dán nhãn thông tin cụm xử lý Server để biểu diễn đồ án
        add_header X-Upstream-Node $upstream_addr always;
        add_header X-Load-Balancer "Nginx Least-Conn" always;
        add_header X-DDoS-Protection "Active" always;

        # Đẩy request vào dải backend_cluster để cân bằng tải
        proxy_pass http://backend_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}