<!DOCTYPE html>
<html lang="vi">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

	<title>Smartphone Store</title>
	<link rel="shortcut icon" href="{{ url_for('static', filename='img/favicon.ico') }}" />

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
	 crossorigin="anonymous">

	<link rel="stylesheet" href="{{ url_for('static', filename='css/vendor/owlcarousel/owl.carousel.min.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/vendor/owlcarousel/owl.theme.default.min.css') }}">
	<script src="{{ url_for('static', filename='js/Jquery/Jquery.min.js') }}"></script>
	<script src="{{ url_for('static', filename='js/owlcarousel/owl.carousel.min.js') }}"></script>

	<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/topnav.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/header.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/banner.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/taikhoan.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/trangchu.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/home_products.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/pagination_phantrang.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/footer.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='css/ai-chat.css') }}">
	<script src="{{ url_for('static', filename='js/classes.js') }}"></script>
	<script src="{{ url_for('static', filename='js/dungchung.js') }}"></script>
	<script src="{{ url_for('static', filename='js/trangchu.js') }}"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>

</head>

<body>
	<script> addHeader(); </script>
	<script> addTopNav(); </script>

	<section>

		<div class="banner">
			<div class="owl-carousel owl-theme"></div>
		</div>

        <div id="top-products-container"></div>
        <div id="homepage-sections"></div>
        <div id="home-filter-controls">
	        <div class="flexContain">
                <div class="pricesRangeFilter dropdown">
                    <button class="dropbtn">
                        <i class="fa fa-money dropbtn-main-icon" aria-hidden="true"></i> <span class="dropbtn-text">Giá tiền</span>
                        <i class="fa fa-chevron-down dropbtn-arrow-icon" aria-hidden="true"></i> </button>
                    <div class="dropdown-content">
                        </div>
                </div>

                <div class="promosFilter dropdown">
                    <button class="dropbtn">
                        <i class="fa fa-tags dropbtn-main-icon" aria-hidden="true"></i> <span class="dropbtn-text">Khuyến mãi</span>
                        <i class="fa fa-chevron-down dropbtn-arrow-icon" aria-hidden="true"></i> </button>
                    <div class="dropdown-content">
                        </div>
                </div>

                <div class="starFilter dropdown">
                    <button class="dropbtn">
                        <i class="fa fa-star dropbtn-main-icon" aria-hidden="true"></i> <span class="dropbtn-text">Số lượng sao</span>
                        <i class="fa fa-chevron-down dropbtn-arrow-icon" aria-hidden="true"></i> </button>
                    <div class="dropdown-content">
                        </div>
                </div>

                <div class="sortFilter dropdown">
                    <button class="dropbtn">
                        <i class="fa fa-sort dropbtn-main-icon" aria-hidden="true"></i> <span class="dropbtn-text">Sắp xếp</span>
                        <i class="fa fa-chevron-down dropbtn-arrow-icon" aria-hidden="true"></i> </button>
                    <div class="dropdown-content">
                        </div>
                </div>
            </div>
            <div class="choosedFilter flexContain">
			    <a id="deleteAllFilter" style="display: none;">
				    <h3>Xóa bộ lọc</h3>
			    </a>
		    </div>
            <hr>
        </div>

		<div class="contain-products" style="display:none"> 
			<div class="filterName">
				<input type="text" placeholder="Lọc trong trang theo tên..." onkeyup="filterProductsName(this)">
			</div> <ul id="products" class="homeproduct group flexContain">
				<div id="khongCoSanPham">
					<i class="fa fa-times-circle"></i>
					Không có sản phẩm nào
				</div> </ul><div class="pagination"></div>
		</div>

		<div class="contain-khungSanPham"></div>

	 </section> 

	<script>
		addContainTaiKhoan(); addPlc();
	</script>

	<div class="footer"><script>addFooter();</script></div>

	<i class="fa fa-arrow-up" id="goto-top-page" onclick="gotoTop()"></i>

    <div id="ai-chat-widget">
        <button id="chat-toggle-button">
            <i class="fa fa-comments"></i> MI AI
        </button>
        <div id="chat-window" class="hidden">
            <div id="chat-header">
                <div class="header-info">
                    <i class="fa fa-robot"></i>
                    <span>MI AI</span>
                </div>
                <button id="chat-close-button">×</button>
            </div>
            <div id="chat-messages"></div>
            <div id="chat-input-container">
                <input type="text" id="chat-input" placeholder="Bạn muốn tìm máy gì...">
                <button id="chat-send-button"><i class="fa fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
	<script src="{{ url_for('static', filename='js/ai-chat.js') }}"></script>
</body>

</html>
